name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit-Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=high

# Hinweis: Die Playwright-E2E-Tests (npm run test:e2e) brauchen das laufende
# Backend (:8000) inkl. Seed-Daten und laufen daher lokal bzw. gegen eine
# Staging-Umgebung, nicht in dieser Client-CI.
